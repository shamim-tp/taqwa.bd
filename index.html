<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAQWA PROPERTIES BD - ERP</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK (প্রয়োজন অনুযায়ী) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script type="module" src="script.js"></script>
</head>
<body>
  <!-- লোডিং ওভারলে -->
  <div id="loadingOverlay" class="loading-overlay">
    <div>
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <!-- টোস্ট বার্তা -->
  <div class="toastWrap" id="toastWrap"></div>

  <!-- লগইন পৃষ্ঠা (প্রথমে দৃশ্যমান) -->
  <div id="loginPage" class="loginWrap">
    <div class="loginCard">
      <div class="loginGrid">
        <div class="loginLeft">
          <h1>TAQWA PROPERTIES BD</h1>
          <!-- প্রতিষ্ঠানের স্লোগান/ছবি দেওয়া যেতে পারে -->
        </div>
        <div class="loginRight">
          <div class="tabs">
            <button id="tabAdmin" class="active">Admin Login</button>
            <button id="tabMember">Member Login</button>
          </div>
          <div class="row">
            <div>
              <label id="loginIdLabel">Admin ID</label>
              <input id="loginId" placeholder="Enter ID" />
            </div>
            <div>
              <label>Password</label>
              <input id="loginPass" type="password" placeholder="Enter Password" />
            </div>
            <button class="btn primary" id="loginBtn">Login</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- মূল অ্যাপ পৃষ্ঠা (লগইনের পর দেখা যাবে) -->
  <div id="appPage" style="display: none;">
    <!-- হেডার / টুলবার -->
    <div class="app-header">
      <div class="user-info">
        <span id="currentUserName"></span>
        <span id="currentUserRole"></span>
      </div>
      <div class="chip-info">
        <span id="chipId"></span>
        <span id="chipStatus"></span>
      </div>
      <div class="system-mode">
        Mode: <span id="systemMode"></span>
      </div>
      <div class="admin-tools">
        <button id="systemToolsBtn" style="display: none;">System Tools</button>
        <button id="quickAddBtn" style="display: none;">Quick Add</button>
      </div>
      <button id="logoutBtn">Logout</button>
    </div>

    <!-- প্রধান বডি: সাইডবার + কন্টেন্ট -->
    <div class="app-body">
      <!-- সাইডবার -->
      <div class="sidebar" id="sidebar">
        <nav id="sidebarNav"></nav>
      </div>

      <!-- মূল কন্টেন্ট এলাকা -->
      <div class="main-content">
        <div class="page-header">
          <h2 id="pageTitle"></h2>
          <p id="pageSubtitle"></p>
        </div>
        <div id="pageContent"></div>
      </div>
    </div>
  </div>

  <!-- মডাল কন্টেইনার (ডায়নামিক মডাল লোডের জন্য) -->
  <div id="modalsContainer"></div>
</body>
</html>
