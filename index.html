<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>TAQWA PROPERTIES BD - ERP</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script type="module" src="script.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div style="text-align: center;">
      <div class="loading-spinner"></div>
      <p style="color: #1e3c72; font-weight: 600;">Loading...</p>
    </div>
  </div>

  <!-- Toast Messages -->
  <div class="toastWrap" id="toastWrap"></div>

  <!-- Login Page -->
  <div id="loginPage" class="loginWrap">
    <div class="loginCard">
      <div class="loginGrid">
        <div class="loginLeft">
          <h1>TAQWA PROPERTIES BD</h1>
          <p>Professional Investment Management ERP System</p>
          <p class="slogan">Trust & Excellence</p>
        </div>
        <div class="loginRight">
          <div class="tabs">
            <button id="tabAdmin" class="active">👤 Admin Login</button>
            <button id="tabMember">👥 Member Login</button>
          </div>
          
          <div style="margin-bottom: 20px;">
            <label id="loginIdLabel">👤 Admin ID</label>
            <input id="loginId" type="text" placeholder="Enter Admin ID" value="ADMIN-001" style="width:100%; padding:16px; border:2px solid #e0e0e0; border-radius:16px; margin-top:8px;">
          </div>
          
          <div style="margin-bottom: 20px;">
            <label>🔐 Password</label>
            <input id="loginPass" type="password" placeholder="Enter Password" value="123456" style="width:100%; padding:16px; border:2px solid #e0e0e0; border-radius:16px; margin-top:8px;">
          </div>
          
          <button class="btn primary" id="loginBtn" style="width:100%; padding:18px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:50px; font-size:18px; font-weight:700; cursor:pointer; margin-top:10px;">Login</button>
          
          <p style="text-align: center; margin-top: 20px; color: #666; font-size: 13px;">
            Default: Admin (ADMIN-001 / 123456)
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- App Page -->
  <div id="appPage" class="app" style="display: none;">
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    
    <div class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h2>TAQWA PROPERTIES BD</h2>
          <div class="small">Investment ERP</div>
        </div>
        <div class="badge" id="systemMode">ADMIN</div>
      </div>
      
      <div class="userBox">
        <div class="name" id="currentUserName">-</div>
        <div class="role" id="currentUserRole">-</div>
        <div class="mini">
          <span class="chip" id="chipId">ID: -</span>
          <span class="chip" id="chipStatus">Active</span>
        </div>
      </div>
      
      <div class="navTitle">📌 Navigation</div>
      <div class="nav" id="sidebarNav"></div>
      
      <button class="logoutBtn" id="logoutBtn" onclick="logout()">
        <span style="margin-right: 8px;">🚪</span> Logout
      </button>
    </div>
    
    <div class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Welcome to TAQWA PROPERTIES ERP</p>
        </div>
        <div class="rightTop">
          <button class="btn hidden" id="systemToolsBtn">⚙️ Tools</button>
          <button class="btn primary hidden" id="quickAddBtn">➕ Quick Add</button>
        </div>
      </div>
      
      <div id="pageContent"></div>
    </div>
  </div>

  <!-- Modal Container -->
  <div id="modalsContainer"></div>
</body>
</html>
