<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>TAQWA PROPERTIES BD - ERP</title>
  <!-- সমস্ত স্টাইল এখন style.css‑এ রাখা হয়েছে -->
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- মূল অ্যাপ্লিকেশন স্ক্রিপ্ট (মডিউল) -->
  <script type="module" src="script.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>
  <!-- লোডিং ওভারলে -->
  <div id="loadingOverlay" class="loading-overlay">
    <div>
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <!-- টোস্ট বার্তা প্রদর্শনের এলাকা -->
  <div class="toastWrap" id="toastWrap"></div>

  <!-- লগইন পৃষ্ঠা (ডিফল্ট মেম্বার ট্যাব সক্রিয়) -->
  <div id="loginPage" class="loginWrap">
    <div class="loginCard">
      <div class="loginGrid">
        <div class="loginLeft">
          <h1>TAQWA PROPERTIES BD</h1>
          <p>Professional Investment Management ERP System</p>
          <p class="slogan">Trust & Excellence</p>
        </div>
        <div class="loginRight">
          <div class="tabs">
            <button id="tabAdmin">Admin Login</button>
            <button id="tabMember" class="active">Member Login</button>
          </div>
          <!-- লগইন ফর্ম -->
          <form id="loginForm" onsubmit="event.preventDefault();">
            <div class="row">
              <div>
                <label id="loginIdLabel">Member ID</label>
                <input id="loginId" placeholder="Enter Member ID" autocomplete="username" />
              </div>
              <div>
                <label>Password</label>
                <input id="loginPass" type="password" placeholder="Enter Password" autocomplete="current-password" />
              </div>
              <button type="submit" class="btn primary" id="loginBtn">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- অ্যাপ পৃষ্ঠা (লগইন সফল হলে দেখা যাবে) -->
  <div id="appPage" class="app" style="display: none;">
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰ Menu</button>
    <div class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h2>TAQWA PROPERTIES BD</h2>
          <div class="small">ERP System</div>
        </div>
        <div class="badge" id="systemMode">ADMIN</div>
      </div>
      <div class="userBox">
        <div class="name" id="currentUserName">-</div>
        <div class="role" id="currentUserRole">-</div>
        <div class="mini">
          <span class="chip" id="chipId">ID: -</span>
          <span class="chip" id="chipStatus">Active</span>
        </div>
      </div>
      <div class="navTitle">Navigation</div>
      <div class="nav" id="sidebarNav"></div>
      <button class="logoutBtn" id="logoutBtn">Logout</button>
    </div>
    <div class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Welcome to TAQWA PROPERTIES ERP</p>
        </div>
        <div class="rightTop">
          <button class="btn hidden" id="systemToolsBtn">System Tools</button>
          <button class="btn primary hidden" id="quickAddBtn">Quick Add</button>
        </div>
      </div>
      <div id="pageContent"></div>
    </div>
  </div>

  <!-- মডাল কন্টেইনার -->
  <div id="modalsContainer"></div>
</body>
</html>
